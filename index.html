<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Second Shift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#F8F7F4;color:#151515;font-family:Inter,sans-serif}
.wrap{max-width:1200px;margin:0 auto;padding:64px 80px 80px}
.logo img{width:270px;height:auto;display:block}
.hero{margin-top:90px;max-width:720px}
.kicker{font-size:13px;letter-spacing:.32em;color:#777;margin-bottom:28px}
h1{font-size:92px;line-height:.93;letter-spacing:-.055em;font-weight:800;margin:0 0 36px}
p{font-size:28px;line-height:1.5;color:#666;max-width:620px;margin:0 0 38px}
.cta{
    max-width:620px;
    margin-top:22px;
}

.waitlist-button{
    width:100%;
    padding:22px 34px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
    transition:background .2s ease;
}

.waitlist-button:hover{
    background:#2a2a2a;
}
@media (max-width:768px){
.wrap{padding:36px 24px}
.logo img{width:240px}
.hero{margin-top:70px}
h1{font-size:58px}
p{font-size:22px}
form{flex-direction:column}
input{border-right:1px solid #d9d9d9;border-radius:14px;margin-bottom:12px}
button{border-radius:14px;padding:18px}
}
</style>
</head>
<body>
<div class="wrap">
<div class="logo"><img src="logo.png" alt="Second Shift"></div>
<section class="hero">
<div class="kicker">COMING SOON</div>
<h1>Life runs on<br>invisible work.</h1>
<p>Second Shift is the operational support modern women need to carry less, reclaim time, and make space for what matters.</p>
<div class="cta">
    <button
        class="waitlist-button"
        data-tally-open="2E5VEV"
        data-tally-layout="modal"
        data-tally-width="500"
        data-tally-overlay="1"
        data-tally-emoji-animation="none">
        JOIN THE WAITLIST
    </button>
</div>
</section>
</div>
<script async src="https://tally.so/widgets/embed.js"></script>
</body>
</html>
